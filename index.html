<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Умный тренер тренировок с авторегуляцией APRE и Recovery Score. Полностью бесплатно, все данные на устройстве.">
  <meta name="theme-color" content="#4f7c44">
  <title>Smart Fitness Coach</title>
  <link rel="manifest" href="manifest.json">
  <!-- Critical CSS inline to eliminate render blocking -->
  <style>
    /* ── Design Tokens (Critical) ── */
    :root {
      --color-bg: #0a0a0a;
      --color-surface: #141414;
      --color-surface-2: #1e1e1e;
      --color-surface-3: #272727;
      --color-border: #303030;
      --color-text-primary: #f2f2f2;
      --color-text-secondary: #c8c8c8;
      --color-text-tertiary: #909090;
      --color-accent-green: #4ade80;
      --color-accent-yellow: #facc15;
      --color-accent-red: #f87171;
      --color-accent-blue: #60a5fa;
      --color-accent-brand: #4f7c44;
      --bg: var(--color-bg);
      --surface: var(--color-surface);
      --surface2: var(--color-surface-2);
      --surface3: var(--color-surface-3);
      --border: var(--color-border);
      --text: var(--color-text-primary);
      --text2: var(--color-text-secondary);
      --text3: var(--color-text-tertiary);
      --green: var(--color-accent-green);
      --yellow: var(--color-accent-yellow);
      --red: var(--color-accent-red);
      --blue: var(--color-accent-blue);
      --accent: var(--color-accent-brand);
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius: var(--radius-md);
      --font-family-base: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font: var(--font-family-base);
      --font-size-h1: 24px;
      --font-size-h2: 20px;
      --font-size-h3: 18px;
      --font-size-body: 14px;
      --font-size-caption: 12px;
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.2);
      --shadow-sm: 0 2px 4px rgba(0, 0, 0, 0.25);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.4);
      --transition-fast: 0.15s ease;
      --transition-normal: 0.2s ease;
      --transition: var(--transition-normal);
    }

    /* ── Reset & Base (Critical) ── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      line-height: 1.5;
      max-width: 500px;
      margin: 0 auto;
      padding: var(--spacing-md);
    }
    #root { margin: 0; padding: 0; height: 100%; display: flex; flex-direction: column; background-color: var(--bg); }

    /* ── Card (Critical) ── */
    .card {
      background-color: var(--surface);
      border-radius: var(--radius);
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-md);
      border: 1px solid var(--border);
      min-height: var(--spacing-lg);
      overflow-wrap: break-word;
      word-break: break-word;
      min-width: 0;
    }

    /* ── Buttons Base (Critical) ── */
    .btn {
      display: inline-block;
      min-height: 44px;
      padding: 0 var(--spacing-md);
      background-color: var(--surface2);
      color: var(--text);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: filter 0.2s ease, transform 0.1s ease;
    }
    .btn:hover { filter: brightness(1.15); }
    .btn:active { transform: scale(0.96); }
    .btn-accent { background-color: var(--accent); color: #fff; }
    .btn-green { background-color: var(--green); color: #000; }

    /* ── Bottom Navigation (Critical - UI backbone) ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0.5rem 0.5rem calc(0.5rem + env(safe-area-inset-bottom));
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px 16px 0 0;
      z-index: 100;
    }
    .bottom-nav__item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 0.65rem;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      min-width: 56px;
    }
    .bottom-nav__item.active { color: var(--green); background: rgba(74, 222, 128, 0.12); }
    .bottom-nav__icon { font-size: 1.3rem; line-height: 1; }
    .bottom-nav__label { font-weight: 500; }

    /* ── App Content (Critical) ── */
    .app-content { flex: 1; overflow-y: auto; padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }

    /* ── Page Layout (Critical) ── */
    .page-enter {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
      min-height: 70vh;
      animation: pageEnter 0.3s ease-out;
    }
    @keyframes pageEnter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Today Page Header (Critical - FCP content) ── */
    .today-page { display: flex; flex-direction: column; gap: var(--spacing-md); padding: var(--spacing-md); min-height: 70vh; }
    .today-header { margin-bottom: var(--spacing-xs); }
    .today-header__title {
      font-size: var(--font-size-h1);
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, var(--green), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .today-header__date { color: var(--text2); font-size: var(--font-size-body); margin: 0.25rem 0 0; }

    /* ── Hero Card (Critical) ── */
    .card--hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--spacing-lg);
      background: linear-gradient(135deg, rgba(74, 222, 128, 0.08), rgba(96, 165, 250, 0.05));
    }

    /* ── Online Status (Critical) ── */
    .online-status { transition: all var(--transition-normal); }

    /* ── Update Banner (Critical) ── */
    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* ── Skeleton Page (Critical) ── */
    .skeleton-page {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
    }
    .readiness-ring { cursor: pointer; transition: transform 0.2s ease; }
    .readiness-ring:hover { transform: scale(1.02); }
    .readiness-ring__svg { display: block; margin: 0 auto; }
  </style>
  <!-- Async load non-critical CSS -->
  <link rel="stylesheet" href="css/styles.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="css/styles.css"></noscript>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="js/app.tsx"></script>

  <script>
    window.addEventListener('error', function(event) {
      console.error('[Global Error]', event.error || event.message);
    });
    window.addEventListener('unhandledrejection', function(event) {
      console.error('[Unhandled Promise Rejection]', event.reason);
    });
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('Service Worker зарегистрирован:', reg.scope);

        // Check for updates periodically
        setInterval(() => {
          reg.update().catch(() => {});
        }, 60000); // Check every 60s

        // Listen for new service workers waiting to activate
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // New version available — the app's useServiceWorkerUpdate hook will detect this
              console.log('[SW] Новая версия доступна');
            }
          });
        });
      }).catch(err => {
        console.error('Ошибка регистрации Service Worker:', err);
      });

      // Handle controller change (new SW activated)
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        console.log('[SW] Новый Service Worker активирован');
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Fitness Coach</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Карта импортов для ES-модулей -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "dexie": "https://esm.sh/dexie@4.0.8",
        "@radix-ui/react-dialog": "https://esm.sh/@radix-ui/react-dialog@1.1.1?external=react,react-dom",
        "@radix-ui/react-collapsible": "https://esm.sh/@radix-ui/react-collapsible@1.1.0?external=react,react-dom"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="js/app.js"></script>
  
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(reg => {
        console.log('Service Worker зарегистрирован:', reg.scope);
      }).catch(err => {
        console.error('Ошибка регистрации Service Worker:', err);
      });
    }
  </script>
</body>
</html>
